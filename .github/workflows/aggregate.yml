name: Build data aggregate

on:
  workflow_dispatch:
    inputs:
      sources_folder:
        description: "ID папки с xlsx-источниками (Царь свод, Царь продажи, data 15-17)"
        required: true
        default: "1DbAM_3ldLBVMGAxUVDtEeSniF4_97nTx"
      dest_folder:
        description: "ID папки, куда положить готовую сводку"
        required: true
        default: "15NmGZPCN0flzJL64JPwFViHBOxi4uD9B"
      period:
        description: "Текущий период, например Q1-2026"
        required: true
        default: "Q1-2026"
      prev:
        description: "Предыдущий период, например Q4-2025"
        required: true
        default: "Q4-2025"
      name:
        description: "Название создаваемой сводки (опционально)"
        required: false
        default: ""

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build aggregate
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          extra=""
          if [ -n "${{ inputs.name }}" ]; then
            extra="--name \"${{ inputs.name }}\""
          fi
          eval python -m reportgen aggregate \
            "${{ inputs.sources_folder }}" \
            --dest "${{ inputs.dest_folder }}" \
            --period "${{ inputs.period }}" \
            --prev "${{ inputs.prev }}" \
            $extra
