name: Forecast 2026 (Маркет / ОФД)

on:
  workflow_dispatch:
    inputs:
      sources_folder:
        description: "ID папки с xlsx (Царь свод)"
        required: true
        default: "1DbAM_3ldLBVMGAxUVDtEeSniF4_97nTx"
      completed:
        description: "Последний завершённый месяц 2026 (5 = май)"
        required: true
        default: "5"

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/quirky-archimedes-38viv
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Forecast
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          python -m reportgen forecast "${{ inputs.sources_folder }}" \
            --completed "${{ inputs.completed }}"
