name: Inspect sales source

on:
  workflow_dispatch:
    inputs:
      sources_folder:
        description: "ID папки с xlsx (Царь продажи)"
        required: true
        default: "1DbAM_3ldLBVMGAxUVDtEeSniF4_97nTx"

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Inspect
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          python -m reportgen inspect-sales "${{ inputs.sources_folder }}"
