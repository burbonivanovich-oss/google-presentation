name: Forecast 2026 → Excel

on:
  workflow_dispatch:
    inputs:
      sources_folder:
        description: "ID папки с xlsx (Царь свод, data 15)"
        required: true
        default: "1DbAM_3ldLBVMGAxUVDtEeSniF4_97nTx"
      dest_folder:
        description: "Куда положить .xlsx (по умолчанию та же папка)"
        required: false
        default: ""
      completed:
        description: "Последний завершённый месяц 2026 (5 = май)"
        required: true
        default: "5"

jobs:
  forecast-xlsx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/quirky-archimedes-38viv
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Build Excel forecast
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          dest=""
          if [ -n "${{ inputs.dest_folder }}" ]; then dest="--dest ${{ inputs.dest_folder }}"; fi
          python -m reportgen forecast-xlsx "${{ inputs.sources_folder }}" \
            $dest --completed "${{ inputs.completed }}"
