name: "Digital Marketing — квартальный отчёт"

# ID папки Google Drive, в которой лежат шаблон и таблицы-источники.
# Берётся из URL: https://drive.google.com/drive/folders/<FOLDER_ID>
folder_id: "PUT_FOLDER_ID_HERE"

# Можно указать либо presentation_template_id (жёстко), либо
# presentation_template_name — паттерн имени файла внутри folder_id.
presentation_template_name: "^Digital Marketing.*template"

# objectId слайда-заготовки внутри шаблона.
# В нём ожидаются плейсхолдеры {{insight_headline}} и {{insight_detail}}.
insight_slide_id: "PUT_INSIGHT_SLIDE_OBJECT_ID_HERE"

sources:
  channels:
    # Регулярка по имени файла в folder_id. Берётся самый свежий (modifiedTime).
    # Например файлы: "channels Q4-2025", "channels Q1-2026" — паттерн возьмёт самый новый.
    name_pattern: "^channels"
    # Первая строка диапазона — заголовки. Колонки: period, channel, spend, revenue, roas, leads.
    range: "A1:F1000"

  # пример второго источника:
  # funnel:
  #   name_pattern: "^funnel"
  #   range: "A1:E500"

insights:
  qoq_threshold_pct: 20.0
  sigma: 3.0
  roas_benchmark: 3.0

static_placeholders:
  "{{company}}": "Ваша Компания"
  "{{author}}": "Отдел маркетинга"
