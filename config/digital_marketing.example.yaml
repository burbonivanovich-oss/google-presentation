# Пример конфига для отчёта по digital-маркетингу.
# Скопируйте в digital_marketing.yaml и подставьте свои ID.

name: "Digital Marketing — квартальный отчёт"

# ID берётся из URL: https://docs.google.com/presentation/d/<ID>/edit
presentation_template_id: "PUT_TEMPLATE_PRESENTATION_ID_HERE"

# В шаблоне презентации должен быть один «слайд-заготовка» под инсайт
# с плейсхолдерами {{insight_headline}} и {{insight_detail}}.
# Скопируйте objectId этого слайда (Slides API → presentations.get → slides[].objectId).
insight_slide_id: "PUT_INSIGHT_SLIDE_OBJECT_ID_HERE"

sources:
  channels:
    # ID берётся из URL: https://docs.google.com/spreadsheets/d/<ID>/edit
    spreadsheet_id: "PUT_SPREADSHEET_ID_HERE"
    # Лист и диапазон. Первая строка — заголовки.
    # Ожидаемые колонки: period, channel, spend, revenue, roas, leads
    range: "channels!A1:F1000"

insights:
  qoq_threshold_pct: 20.0
  sigma: 3.0
  roas_benchmark: 3.0

# Любые ваши плейсхолдеры — текст в шаблоне типа {{ceo_name}} будет заменён.
static_placeholders:
  "{{company}}": "Ваша Компания"
  "{{author}}": "Отдел маркетинга"
