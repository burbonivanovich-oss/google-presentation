# Розница: продажа касс и ОФД.
# Этот конфиг — стартовая точка. Имена файлов и колонок поправим, когда
# увидим первый прогон.

name: "Сверка — Розница (кассы, ОФД)"

folder_id: "5NmGZPCN0flzJL64JPwFViHBOxi4uD9B"

# Берём первую найденную Google Slides в папке, в имени которой есть "шаблон"
# (без учёта регистра). Если не подойдёт — заменим на точное имя.
presentation_template_name: "шаблон|template"

sources:
  channels:
    # Любая таблица с "розниц" или "retail" в имени.
    name_pattern: "розниц|retail"
    # Подкорректируйте имя листа, если он не первый. Можно "Лист1!A1:Z1000".
    range: "A1:Z1000"

insights:
  qoq_threshold_pct: 20.0
  sigma: 3.0
  roas_benchmark: 3.0

static_placeholders:
  "{{direction}}": "Розница (кассы, ОФД)"
