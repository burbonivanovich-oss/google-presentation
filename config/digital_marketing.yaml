name: "Digital Marketing — квартальный отчёт"

# Папка в Google Drive с шаблоном и таблицами.
folder_id: "5NmGZPCN0flzJL64JPwFViHBOxi4uD9B"

# TODO: regex имени файла-шаблона презентации внутри folder_id.
# Например, если файл называется "Digital Marketing — template", сюда подойдёт "^Digital Marketing.*template".
presentation_template_name: "PUT_TEMPLATE_NAME_PATTERN_HERE"

# TODO: objectId слайда-заготовки внутри шаблона.
# В нём должны быть плейсхолдеры {{insight_headline}} и {{insight_detail}}.
# Узнать objectId можно так (после того как secrets/service_account.json положен):
#   python -m reportgen list-slides --template "PUT_TEMPLATE_NAME_PATTERN_HERE"
insight_slide_id: "PUT_INSIGHT_SLIDE_OBJECT_ID_HERE"

sources:
  channels:
    # TODO: regex имени таблицы-источника. Например "^channels".
    name_pattern: "PUT_TABLE_NAME_PATTERN_HERE"
    # Первая строка диапазона — заголовки. Ожидаемые колонки:
    # period, channel, spend, revenue, roas, leads
    range: "A1:F1000"

insights:
  qoq_threshold_pct: 20.0
  sigma: 3.0
  roas_benchmark: 3.0

static_placeholders:
  "{{company}}": "Ваша Компания"
  "{{author}}": "Отдел маркетинга"
